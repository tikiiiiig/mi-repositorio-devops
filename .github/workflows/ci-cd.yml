name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Construir imagen Docker
      run: docker build -t mi-app ./app

    - name: Ejecutar contenedor (test)
      run: docker run -d -p 5000:5000 mi-app